name: Bug report
description: Report a bug in Eye_lean (Unity, Python, or both)
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Before submitting,
        please skim the existing issues and the
        [troubleshooting guide](../docs/TROUBLESHOOTING.md).

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Unity toolkit (data collection)
        - Python analysis package
        - Replay system (editor)
        - Calibration profile / post-hoc correction
        - Sample experiment
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Eye_lean version
      description: Tag, commit hash, or "main".
      placeholder: "v1.2.0 / commit 66f3bac / main"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One-paragraph summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: |
        Unity version (if applicable), VIVE OpenXR version, headset model,
        Python version, OS. `pip freeze` is useful for Python issues.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      render: shell
